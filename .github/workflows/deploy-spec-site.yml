name: Deploy Spec Site

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - 'spec-site/**'
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-flight runs on new push.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: spec-site/package-lock.json

      - name: Install dependencies
        working-directory: spec-site
        run: npm ci

      - name: Build
        working-directory: spec-site
        run: npm run build

      - name: Write CNAME
        run: echo "spec.canvasprotocol.org" > spec-site/.vitepress/dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: spec-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
